<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json,{'display':'standalone'}">

    <title>입금관리 앱</title>
    <style>
        /* 경직님의 기존 스타일 코드 시작 */
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 500px; margin: 0 auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        h1 { text-align: center; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .delete-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .delete-btn:hover { background-color: #c82333; }
        /* 경직님의 기존 스타일 코드 끝 */
    </style>
</head>
<body>

<div class="container">
    <h1>입금 관리</h1>
    <label for="date">날짜:</label>
    <input type="date" id="date">
    <label for="source">입금처:</label>
    <input type="text" id="source" placeholder="예: 거실 페인트">
    <label for="amount">금액:</label>
    <input type="number" id="amount" placeholder="예: 100000">
    <button id="add-btn">추가하기</button>

    <table id="deposit-table">
        <thead>
            <tr>
                <th>날짜</th>
                <th>입금처</th>
                <th>금액</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    /* 경직님의 기존 자바스크립트 로직 그대로 유지 */
    const dateInput = document.getElementById('date');
    const sourceInput = document.getElementById('source');
    const amountInput = document.getElementById('amount');
    const addBtn = document.getElementById('add-btn');
    const tableBody = document.querySelector('#deposit-table tbody');

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        loadData();
    };

    addBtn.onclick = () => {
        const date = dateInput.value;
        const source = sourceInput.value;
        const amount = amountInput.value;
        if (!date || !source || !amount) { alert('모든 필드를 입력해주세요.'); return; }
        const data = { date, source, amount };
        saveData(data);
        renderRow(data);
        sourceInput.value = '';
        amountInput.value = '';
    };

    function saveData(data) {
        const list = JSON.parse(localStorage.getItem('deposits') || '[]');
        list.push(data);
        localStorage.setItem('deposits', JSON.stringify(list));
    }

    function loadData() {
        const list = JSON.parse(localStorage.getItem('deposits') || '[]');
        list.forEach(renderRow);
    }

    function renderRow(data) {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${data.date}</td>
            <td>${data.source}</td>
            <td>${Number(data.amount).toLocaleString()}원</td>
            <td><button class="delete-btn">삭제</button></td>
        `;
        row.querySelector('.delete-btn').onclick = () => {
            row.remove();
            removeData(data);
        };
        tableBody.appendChild(row);
    }

    function removeData(data) {
        let list = JSON.parse(localStorage.getItem('deposits') || '[]');
        list = list.filter(item => !(item.date === data.date && item.source === data.source && item.amount === data.amount));
        localStorage.setItem('deposits', JSON.stringify(list));
    }
</script>
</body>
</html>
