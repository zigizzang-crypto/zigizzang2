<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="입금관리">
    
    <title>입금 관리 시스템</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333;
            --accent-color: #e74c3c;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--secondary-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            /* 모바일에서 롱터치로 인한 선택 방지 (앱 느낌 강조) */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px; /* 모바일 줌 방지를 위해 16px 권장 */
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:active {
            background-color: #357abd;
            transform: scale(0.98);
        }

        .list-container {
            margin-top: 30px;
        }

        .item {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info div {
            margin-bottom: 3px;
        }

        .amount {
            font-weight: 700;
            color: var(--primary-color);
        }

        .date {
            font-size: 0.8rem;
            color: #888;
        }

        .delete-btn {
            background: #ffeded;
            color: var(--accent-color);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-wallet"></i> 입금 관리</h2>
    
    <div class="input-group">
        <label>입금처</label>
        <input type="text" id="client" placeholder="예: OO빌라 302호">
    </div>
    
    <div class="input-group">
        <label>금액</label>
        <input type="number" id="amount" placeholder="숫자만 입력">
    </div>

    <div class="input-group">
        <label>입금 날짜</label>
        <input type="date" id="date">
    </div>

    <button onclick="addEntry()">기록 저장하기</button>

    <div class="list-container" id="listContainer">
        </div>
</div>

<script>
    // 오늘 날짜 기본 설정
    document.getElementById('date').valueAsDate = new Date();

    // 로컬 스토리지 데이터 불러오기
    let entries = JSON.parse(localStorage.getItem('incomeEntries')) || [];

    function render() {
        const container = document.getElementById('listContainer');
        container.innerHTML = '<h3>입금 내역</h3>';
        
        entries.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach((entry, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="item-info">
                    <div style="font-weight:700">${entry.client}</div>
                    <div class="amount">${Number(entry.amount).toLocaleString()}원</div>
                    <div class="date">${entry.date}</div>
                </div>
                <button class="delete-btn" onclick="deleteEntry(${index})">삭제</button>
            `;
            container.appendChild(div);
        });
    }

    function addEntry() {
        const client = document.getElementById('client').value;
        const amount = document.getElementById('amount').value;
        const date = document.getElementById('date').value;

        if(!client || !amount || !date) {
            alert('모든 항목을 입력해주세요!');
            return;
        }

        entries.push({ client, amount, date });
        localStorage.setItem('incomeEntries', JSON.stringify(entries));
        
        // 입력창 초기화
        document.getElementById('client').value = '';
        document.getElementById('amount').value = '';
        
        render();
    }

    function deleteEntry(index) {
        if(confirm('정말 삭제하시겠습니까?')) {
            entries.splice(index, 1);
            localStorage.setItem('incomeEntries', JSON.stringify(entries));
            render();
        }
    }

    // 초기 실행
    render();
</script>

</body>
</html>
